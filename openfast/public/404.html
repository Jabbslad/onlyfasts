<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // GitHub Pages SPA fallback — redirect to index.html preserving the path
      var seg = window.location.pathname.split('/').filter(Boolean);
      var base = '/' + seg[0] + '/';
      window.location.replace(base);
    </script>
  </head>
</html>
